version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fitness_mvp_user
      POSTGRES_PASSWORD: fitness_mvp_pass
      POSTGRES_DB: fitness_mvp_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: